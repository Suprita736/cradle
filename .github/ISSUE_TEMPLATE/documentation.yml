name: Documentation
description: Report an issue or suggest an improvement for documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve our documentation!
  - type: textarea
    id: description
    attributes:
      label: Description of the documentation issue
      description: What is wrong or missing in the documentation?
    validations:
      required: true
  - type: input
    id: file-path
    attributes:
      label: File Path or URL
      description: Provide the path to the file or URL of the documentation in question.
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested Fix (Optional)
      description: How should the documentation be updated?
