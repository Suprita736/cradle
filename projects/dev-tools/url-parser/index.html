<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Parser</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="app">

  <div class="card">
    <div class="header">
      <h1>🔗 URL Parser</h1>
      <p>Break URLs into readable components</p>
    </div>
    <div class="input-box">
      <input 
        id="urlInput"
        value="https://github.com/user/repo?tab=readme#install"
        placeholder="Paste URL here..."
      />
      <button id="parseBtn">
        Parse
      </button>
    </div>
    <div id="result"></div>
  </div>

</div>
<script src="script.js"></script>

</body>
</html>
