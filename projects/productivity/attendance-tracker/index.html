<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../../../src/components/ui/tokens.css">
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>Attendance Dashboard</h1>
            <div class="header-actions">
                <button
                    class="btn-export-action"
                    data-cradle-btn
                    data-variant="success"
                    data-size="sm"
                    data-left-icon="⬇"
                    onclick="exportCSV()"
                >
                    Export CSV
                </button>

                <button
                    class="btn-import-action"
                    data-cradle-btn
                    data-variant="outline"
                    data-size="sm"
                    data-left-icon="⬆"
                    onclick="triggerImport()"
                >
                    Import CSV
                </button>
                <input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="importCSV(event)">

                <button
                    data-cradle-btn
                    data-variant="primary"
                    data-size="sm"
                    data-left-icon="+"
                    onclick="openModal()"
                >
                    New Subject
                </button>
            </div>
        </div>

        <div class="stats-dashboard" id="statsDashboard">
            <div class="stat-card">
                <span class="stat-label">Overall Attendance</span>
                <strong class="stat-value" id="overallAttendance">0%</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Conducted</span>
                <strong class="stat-value" id="totalConducted">0</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Below Target</span>
                <strong class="stat-value" id="belowTargetCount">0</strong>
            </div>
        </div>

        <div class="card" data-cradle-card data-title="Subjects">
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Total Classes</th>
                        <th>Present</th>
                        <th>Absent</th>
                        <th>Current %</th>
                        <th>Required / Remaining</th>
                        <th>Update</th>
                    </tr>
                </thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>

        <div class="card" data-cradle-card data-title="Recent History">
            <div class="history-header">
                <button
                    class="btn-clear-history-action"
                    data-cradle-btn
                    data-variant="danger"
                    data-size="sm"
                    onclick="clearHistory()"
                    aria-label="Clear all attendance history"
                >
                    Clear History
                </button>
            </div>
            <div id="history-log" class="history-list"></div>
        </div>

        <div class="card" data-cradle-card data-title="Attendance Overview">
            <div class="chart-container">
                <canvas id="attendanceChart"></canvas>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Add New Subject</h2>
                <button class="close-btn" aria-label="Close" onclick="closeModal()">&times;</button>
            </div>
            <form id="newSubjectForm" onsubmit="addSubject(event)">
                <div class="form-group">
                    <label for="subName">Subject Name</label>
                    <input type="text" id="subName" placeholder="enter subject name" required>
                </div>
                <div class="form-group">
                    <label for="subTotal">Estimated Total Classes</label>
                    <input type="number" id="subTotal" value="45" min="1" required>
                </div>
                <div class="form-group">
                    <label for="subTarget">Target Percentage (%)</label>
                    <input type="number" id="subTarget" value="75" min="1" max="100" required>
                </div>
                <button
                    type="submit"
                    data-cradle-btn
                    data-variant="primary"
                    data-size="md"
                    data-full-width="true"
                    style="margin-top: 10px;"
                >
                    Add Subject
                </button>
            </form>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../../../src/components/ui/Button/Button.js"></script>
<script src="../../../src/components/ui/Card/Card.js"></script>
<script src="../../../src/components/ui/BackToHome/BackToHome.js" defer></script>
<script src="data-handler.js"></script>
<script src="script.js"></script>
</body>

</html>
