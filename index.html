<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cradle</title>

  <meta name="description" content="Cradle — A curated archive of experiments." />

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="hero">
    <h1>Cradle</h1>

    <p class="hero-tagline">
      A curated archive of experiments...
    </p>

    <div class="hero-actions">
      <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        🌙
      </button>
    </div>

    <div class="search-container">
      <div class="search-wrapper">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>

        <input type="text" id="search" placeholder="Search projects..." autocomplete="off"
          aria-label="Search projects" />
      </div>
    </div>
  </header>

  <main>
    <section id="categories"></section>

    <section>
      <div class="section-header">
        <h2>Projects</h2>

        <span id="project-count">
          0 projects
        </span>
      </div>

      <div id="projects-grid" class="projects-grid"></div>
    </section>
  </main>

  <footer>
    <p>
      Enjoying Cradle?

      <a href="https://github.com/Facelessism/cradle" target="_blank" rel="noopener noreferrer" class="footer-link">
        ★ Star the repository on GitHub
      </a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
